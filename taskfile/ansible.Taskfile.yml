# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
# ==============================================================================
# File: taskfile/ansible.Taskfile.yml
# Purpose:
#   Run Ansible operational checks against the homelab inventory.
# Notes:
#   - This Taskfile must not create or recreate state/config/.env.
#   - This Taskfile must not create or recreate passwords.enc.env.
#   - Password values are loaded into the process environment only when SOPS is ready.
# ==============================================================================

version: '3'

tasks:
  default:
    desc: Show available Ansible tasks
    cmds:
      - task: tasklist

  tasklist:
    desc: Show available Ansible tasks
    cmds:
      - task --taskfile "{{.TASKFILE}}" --list

  help:
    desc: Show safe Ansible tasks
    cmds:
      - |
        set -euo pipefail
        printf '%s\n' \
          'Safe Ansible task help' \
          '' \
          'Connectivity' \
          '  task ansible:ping' \
          '    Run ansible all -m ping against state/ansible/inventory.yml.' \
          '  task ansible:inventory:scan DISCOVERY_TARGET=localnet' \
          '    Scan the network with arp-scan and update state/ansible/inventory.yml.' \
          '' \
          'Plex' \
          '  task ansible:plex:configure' \
          '    Prompt for missing Plex values, save them to state files, then run reusable Ansible roles.' \
          '  task ansible:plex:prepare-vars' \
          '    Prompt for missing Plex variables and save non-secrets to .env and secrets to SOPS.' \
          '' \
          'Audit' \
          '  task ansible:audit' \
          '    Report Ansible command, inventory, SOPS password readiness, and ping capability.'

  ping:
    desc: Run ansible ping per host using the homelab inventory without failing the full setup.
    cmds:
      - |
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/{{.TERMINAL_COLOURS_SCRIPT}}"
        print_section_header "Run Ansible ping against the homelab inventory." "PEACH"
      - |
        set -euo pipefail
        export PATH="${HOME}/.local/bin:${PATH}"

        inventory_file="{{.ANSIBLE_INVENTORY_FILE}}"
        password_file="{{.PASSWORDS_ENCRYPTED_FILE}}"
        age_key_file="{{.SOPS_AGE_KEY_FILE}}"

        if [[ ! -f "$inventory_file" ]]; then
          echo "ERROR: Missing inventory file: ${inventory_file}" >&2
          echo "Run: task env_create:inventory:init" >&2
          exit 1
        fi

        if ! command -v ansible >/dev/null 2>&1; then
          echo "ERROR: ansible is not available on PATH." >&2
          echo "Run: task apps:ansible" >&2
          exit 1
        fi

        if [[ -f "$password_file" ]] && command -v sops >/dev/null 2>&1; then
          if [[ -f "$age_key_file" ]]; then
            export SOPS_AGE_KEY_FILE="$age_key_file"
          fi

          set -a
          source <(sops --decrypt --input-type dotenv --output-type dotenv "$password_file")
          set +a
        fi

        if [[ -z "${OMV_SMB_PASSWORD:-}" ]]; then
          echo "ERROR: OMV_SMB_PASSWORD was not exported from ${password_file}." >&2
          echo "Run: task passwords:edit" >&2
          exit 1
        fi

        mapfile -t hosts < <(ansible all -i "$inventory_file" --list-hosts 2>/dev/null | sed '1d' | awk '{$1=$1; print}' | sed '/^$/d')

        if [[ "${#hosts[@]}" -eq 0 ]]; then
          echo "WARNING: No Ansible hosts were found in ${inventory_file}."
          exit 0
        fi

        echo
        echo "Ansible ping report"
        echo "-------------------"
        printf '%-24s %s\n' "Host" "Status"
        printf '%-24s %s\n' "----" "------"

        failed=0
        for host in "${hosts[@]}"; do
          output_file="$(mktemp)"
          if ansible "$host" -i "$inventory_file" -m ping >"$output_file" 2>&1; then
            printf '%-24s [OK]\n' "$host"
          else
            failed=$((failed + 1))
            reason="$(grep -E 'UNREACHABLE|FAILED|Permission denied|Could not resolve|timed out|No route' "$output_file" | head -n 1 | sed 's/^[[:space:]]*//')"
            printf '%-24s [FAIL] %s\n' "$host" "${reason:-see ansible output}"
          fi
          rm -f "$output_file"
        done

        if [[ "$failed" -gt 0 ]]; then
          echo
          echo "WARNING: ${failed} host(s) failed Ansible ping. Setup will continue; review inventory, SSH key auth, and SOPS readiness."
        fi


  inventory:scan:
    desc: Scan the network with arp-scan and update the homelab Ansible inventory.
    cmds:
      - |
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/{{.TERMINAL_COLOURS_SCRIPT}}"
        print_section_header "Scan network and update Ansible inventory." "PEACH"
      - |
        set -euo pipefail
        export PATH="${HOME}/.local/bin:${PATH}"
        export ROOT_DIR="${ROOT_DIR}"

        inventory_file="{{.ANSIBLE_INVENTORY_FILE}}"
        inventory_dir="{{.ANSIBLE_DIR}}"
        playbook_file="ansible/playbooks/inventory-network-discovery.yml"
        discovery_target="{{.DISCOVERY_TARGET | default "localnet"}}"
        discovery_interface="{{.DISCOVERY_INTERFACE | default ""}}"
        discovery_group="{{.DISCOVERY_GROUP | default "discovered"}}"
        discovery_ssh_user="{{.DISCOVERY_SSH_USER | default "root"}}"
        discovery_ssh_port="{{.DISCOVERY_SSH_PORT | default "22"}}"
        discovery_hostname_prefix="{{.DISCOVERY_HOSTNAME_PREFIX | default "host"}}"
        discovery_dry_run="{{.DISCOVERY_DRY_RUN | default "false"}}"

        mkdir -p "$inventory_dir"

        if [[ ! -f "$inventory_file" ]]; then
          echo "Inventory file does not exist. Creating the baseline inventory first."
          task env_create:inventory:init
        fi

        if ! command -v ansible-playbook >/dev/null 2>&1; then
          echo "ERROR: ansible-playbook is not available on PATH." >&2
          echo "Run: task apps:ansible" >&2
          exit 1
        fi

        if ! command -v arp-scan >/dev/null 2>&1; then
          echo "ERROR: arp-scan is not available on PATH." >&2
          echo "Run: task apps:prerequisites" >&2
          exit 1
        fi

        export ANSIBLE_CONFIG="${ROOT_DIR}/ansible.cfg"
        export ANSIBLE_ROLES_PATH="${ROOT_DIR}/ansible/roles:${ANSIBLE_ROLES_PATH:-}"

        ansible-playbook -i "localhost," "$playbook_file" \
          -e "homelab_inventory_discovery_inventory_file=$inventory_file" \
          -e "homelab_inventory_discovery_script_file={{.INVENTORY_NETWORK_SYNC_SCRIPT}}" \
          -e "homelab_inventory_discovery_scan_target=$discovery_target" \
          -e "homelab_inventory_discovery_interface=$discovery_interface" \
          -e "homelab_inventory_discovery_group=$discovery_group" \
          -e "homelab_inventory_discovery_hostname_prefix=$discovery_hostname_prefix" \
          -e "homelab_inventory_discovery_ssh_user=$discovery_ssh_user" \
          -e "homelab_inventory_discovery_ssh_port=$discovery_ssh_port" \
          -e "homelab_inventory_discovery_dry_run=$discovery_dry_run"

  plex:configure:
    desc: Configure Plex servers using reusable Ansible roles.
    cmds:
      - task: plex:prepare-vars
      - |
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/{{.TERMINAL_COLOURS_SCRIPT}}"
        print_section_header "Configure Plex servers with Ansible roles." "PEACH"
      - |
        set -euo pipefail
        export PATH="${HOME}/.local/bin:${PATH}"

        inventory_file="{{.ANSIBLE_INVENTORY_FILE}}"
        password_file="{{.PASSWORDS_ENCRYPTED_FILE}}"
        age_key_file="{{.SOPS_AGE_KEY_FILE}}"
        playbook_file="ansible/playbooks/plex-configure.yml"

        if [[ ! -f "$inventory_file" ]]; then
          echo "ERROR: Missing inventory file: ${inventory_file}" >&2
          echo "Run: task env_create:inventory:init" >&2
          exit 1
        fi

        if [[ ! -f "$playbook_file" ]]; then
          echo "ERROR: Missing playbook file: ${playbook_file}" >&2
          exit 1
        fi

        if ! command -v ansible-playbook >/dev/null 2>&1; then
          echo "ERROR: ansible-playbook is not available on PATH." >&2
          echo "Run: task apps:ansible" >&2
          exit 1
        fi

        if [[ -f "{{.CONFIG_ENV_FILE}}" ]]; then
          set -a
          # shellcheck source=/dev/null
          source "{{.CONFIG_ENV_FILE}}"
          set +a
        fi

        if [[ -f "$password_file" ]] && command -v sops >/dev/null 2>&1; then
          if [[ -f "$age_key_file" ]] && SOPS_AGE_KEY_FILE="$age_key_file" sops -d "$password_file" >/dev/null 2>&1; then
            set -a
            # shellcheck disable=SC1090
            source <(SOPS_AGE_KEY_FILE="$age_key_file" sops -d "$password_file")
            set +a
          elif sops -d "$password_file" >/dev/null 2>&1; then
            set -a
            # shellcheck disable=SC1090
            source <(sops -d "$password_file")
            set +a
          fi
        fi

        export ANSIBLE_CONFIG="${ROOT_DIR}/ansible.cfg"
        export ANSIBLE_ROLES_PATH="${ROOT_DIR}/ansible/roles:${ANSIBLE_ROLES_PATH:-}"

        if [[ "${HOMELAB_PLEX_SERVICE_NAME:-plexmediaserver}" =~ ^plex0[0-9]+$ ]]; then
          echo "ERROR: HOMELAB_PLEX_SERVICE_NAME is the Linux service name, not the Plex host/container name." >&2
          echo "Use the default: plexmediaserver" >&2
          echo "Edit {{.CONFIG_ENV_FILE}} or rerun task ansible:plex:prepare-vars after removing HOMELAB_PLEX_SERVICE_NAME." >&2
          exit 1
        fi

        ansible-playbook -i "$inventory_file" "$playbook_file"

  plex:prepare-vars:
    desc: Prompt for missing Plex variables and save them to state files.
    cmds:
      - |
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/{{.TERMINAL_COLOURS_SCRIPT}}"
        print_section_header "Prepare Plex configuration variables." "PEACH"
      - |
        set -euo pipefail

        config_file="{{.CONFIG_ENV_FILE}}"
        password_file="{{.PASSWORDS_ENCRYPTED_FILE}}"
        runtime_file="{{.PASSWORDS_RUNTIME_FILE}}"
        age_key_file="{{.SOPS_AGE_KEY_FILE}}"
        recipients_file="{{.SOPS_AGE_RECIPIENTS_FILE}}"

        mkdir -p "$(dirname "$config_file")" "$(dirname "$password_file")"
        touch "$config_file"
        chmod 600 "$config_file"

        upsert_env_file() {
          local file_path="$1"
          local key="$2"
          local value="$3"
          python3 -S "{{.SCRIPT_LIB_DIR}}/env-file-manager.py" upsert \
            --file "$file_path" \
            --key "$key" \
            --value "$value"
        }

        read_env_value() {
          local key="$1"
          if [[ -f "$config_file" ]]; then
            grep -E "^${key}=" "$config_file" | tail -n 1 | cut -d= -f2- | sed -e 's/^"//' -e 's/"$//' || true
          fi
        }

        prompt_plain_if_missing() {
          local key="$1"
          local prompt="$2"
          local default_value="$3"
          local current_value="${!key:-}"
          if [[ -z "$current_value" ]]; then
            current_value="$(read_env_value "$key")"
          fi
          if [[ -z "$current_value" ]]; then
            printf '%s [%s]: ' "$prompt" "$default_value" > /dev/tty
            IFS= read -r current_value < /dev/tty
            current_value="${current_value:-$default_value}"
            upsert_env_file "$config_file" "$key" "$current_value"
            export "$key=$current_value"
          fi
        }

        decrypt_passwords() {
          export SOPS_AGE_KEY_FILE="$age_key_file"
          if [[ ! -f "$password_file" ]] || ! grep -Eq '^(sops_|sops:)' "$password_file"; then
            task passwords:encrypt
          fi
          if [[ ! -f "$password_file" ]]; then
            echo "ERROR: Missing encrypted password file: ${password_file}" >&2
            exit 1
          fi
          if [[ -f "$age_key_file" ]]; then
            SOPS_AGE_KEY_FILE="$age_key_file" sops --decrypt --input-type dotenv --output-type dotenv "$password_file" > "$runtime_file"
          else
            sops --decrypt --input-type dotenv --output-type dotenv "$password_file" > "$runtime_file"
          fi
          chmod 600 "$runtime_file"
        }

        encrypt_passwords() {
          export SOPS_AGE_KEY_FILE="$age_key_file"
          if [[ ! -f "$recipients_file" ]]; then
            echo "ERROR: Missing SOPS recipients file. Run: task passwords:keys:generate" >&2
            exit 1
          fi
          recipient="$(grep -v '^[[:space:]]*$' "$recipients_file" | head -n 1)"
          if [[ -z "$recipient" ]]; then
            echo "ERROR: SOPS recipient file is empty: ${recipients_file}" >&2
            exit 1
          fi
          encrypted_tmp="$(mktemp)"
          if ! sops --encrypt --age "$recipient" --input-type dotenv --output-type dotenv --filename-override "$password_file" "$runtime_file" > "$encrypted_tmp"; then
            rm -f "$encrypted_tmp"
            echo "ERROR: Failed to encrypt updated password file with SOPS." >&2
            exit 1
          fi
          chmod 600 "$encrypted_tmp"
          mv "$encrypted_tmp" "$password_file"
          chmod 600 "$password_file"
          rm -f "$runtime_file"
        }

        read_secret_value() {
          local key="$1"
          if [[ -f "$runtime_file" ]]; then
            grep -E "^${key}=" "$runtime_file" | tail -n 1 | cut -d= -f2- | sed -e 's/^"//' -e 's/"$//' || true
          fi
        }

        prompt_secret_if_missing() {
          local key="$1"
          local prompt="$2"
          local current_value="${!key:-}"
          if [[ -z "$current_value" ]]; then
            current_value="$(read_secret_value "$key")"
          fi
          if [[ -z "$current_value" ]]; then
            printf '%s: ' "$prompt" > /dev/tty
            IFS= read -rs current_value < /dev/tty
            printf '\n' > /dev/tty
            if [[ -z "$current_value" ]]; then
              echo "ERROR: ${key} cannot be blank." >&2
              exit 1
            fi
            upsert_env_file "$runtime_file" "$key" "$current_value"
            export "$key=$current_value"
          fi
        }

        prompt_plain_if_missing HOMELAB_PLEX_TARGET_HOSTS "Ansible target host/group for Plex" "plex"
        prompt_plain_if_missing OMV_SMB_HOST "OMV SMB host/IP" "192.168.30.20"
        prompt_plain_if_missing OMV_SMB_USERNAME "OMV SMB username" "omvuser"
        prompt_plain_if_missing HOMELAB_SHARED_DRIVE_NAMES "Shared drive names, comma separated" "TB4a,TB5a,TB10a,TB10b,TB16a"
        prompt_plain_if_missing HOMELAB_SHARED_DRIVES_BEHAVIOUR "Existing fstab mount behaviour, s=skip or r=replace" "s"
        prompt_plain_if_missing HOMELAB_PLEX_HOST "Plex local API host inside the server" "127.0.0.1"
        prompt_plain_if_missing HOMELAB_PLEX_PORT "Plex local API port" "32400"
        prompt_plain_if_missing HOMELAB_PLEX_SERVICE_NAME "Plex Linux service name, not host/container name" "plexmediaserver"

        if ! command -v sops >/dev/null 2>&1; then
          echo "ERROR: sops is required to save Plex secrets. Run: task passwords:setup" >&2
          exit 1
        fi

        decrypt_passwords
        trap 'rm -f "$runtime_file"' EXIT
        prompt_secret_if_missing OMV_SMB_PASSWORD "OMV SMB password"
        prompt_secret_if_missing PLEX_CLAIM_TOKEN "Fresh Plex claim token from https://www.plex.tv/claim"
        encrypt_passwords
        trap - EXIT

        echo "Plex configuration variables are ready. Non-secrets are in ${config_file}; secrets are in ${password_file}."

  audit:
    desc: Report Ansible readiness and connectivity capability.
    cmds:
      - |
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/{{.TERMINAL_COLOURS_SCRIPT}}"
        print_section_header "Audit Ansible readiness and capability." "PEACH"
      - |
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/{{.HEALTH_CHECK_SCRIPT}}"

        inventory_file="{{.ANSIBLE_INVENTORY_FILE}}"
        password_file="{{.PASSWORDS_ENCRYPTED_FILE}}"
        age_key_file="{{.SOPS_AGE_KEY_FILE}}"

        health_heading "Ansible health"
        health_binary_or_pipx "Ansible" ansible ansible ansible --version
        health_binary_or_pipx "Ansible Galaxy" ansible-galaxy ansible ansible-galaxy --version
        health_file "Inventory" "$inventory_file"
        health_sops_status "Password environment" "$password_file" "$age_key_file" || true

        health_heading "Ansible capabilities"
        if command -v ansible >/dev/null 2>&1 && [[ -f "$inventory_file" ]]; then
          health_ok "Inventory ping" "ready; run task ansible:ping"
        else
          health_missing "Inventory ping" "requires ansible and ${inventory_file}"
        fi
