# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
# ==============================================================================
# File: taskfile/terraform.Taskfile.yml
# Purpose:
#   Run Terraform workflows owned by the homelab repository.
# Notes:
#   - This Taskfile loads state/config/.env explicitly because older Task
#     versions may not support CLI dotenv loading.
#   - Terraform LXC secrets are sourced from the SOPS encrypted password file
#     when available, then written to a local-only generated tfvars file.
#   - Destructive tasks are explicit and never run from default/help tasks.
# ==============================================================================

version: '3'

silent: true

vars:
  TERRAFORM_LXC_DIR: terraform/proxmox/community-scripts-lxc
  TERRAFORM_PARALLELISM: '{{.TERRAFORM_PARALLELISM | default "2"}}'
  TERRAFORM_LXC_TARGET: '{{.TERRAFORM_LXC_TARGET | default ""}}'
  TERRAFORM_LXC_SECRET_TFVARS: terraform/proxmox/community-scripts-lxc/secrets.auto.tfvars.json
  TERRAFORM_LXC_VARS_FILE: terraform/proxmox/community-scripts-lxc/containers.auto.tfvars.json
  TERRAFORM_LXC_SECRET_MANAGER_SCRIPT: scripts/lib/terraform-lxc-secret-manager.py
  PROXMOX_LXC_START_MANAGER_SCRIPT: scripts/lib/proxmox-lxc-start-manager.py
  PROXMOX_LXC_START_WAIT_SECONDS: '{{.PROXMOX_LXC_START_WAIT_SECONDS | default "90"}}'
  PROXMOX_LXC_SSH_WAIT_SECONDS: '{{.PROXMOX_LXC_SSH_WAIT_SECONDS | default "240"}}'

tasks:
  default:
    desc: Show available Terraform tasks
    cmds:
      - task: tasklist

  tasklist:
    desc: Show available Terraform tasks
    cmds:
      - task --taskfile '{{.TASKFILE}}' --list

  help:
    desc: Show safe Terraform task help
    cmds:
      - |
        set -euo pipefail

        cat <<'EOHELP'
        Safe Terraform task help

        LXC deployment
          task terraform:lxc:init
            Initialise the Proxmox Community Scripts LXC Terraform directory.

          task terraform:lxc:passwords:prepare
            Prompt for missing per-container LXC root passwords and prepare local Terraform secrets.

          task terraform:lxc:plan
            Plan LXC deployment using Proxmox SSH settings from state/config/.env.

          task terraform:lxc:apply
            Apply LXC deployment using limited parallelism, then prompt to add
            Terraform-created LXC servers to the Ansible inventory.

          task terraform:lxc:start
            Start any Terraform-defined LXC containers that exist but are not running.

          task terraform:lxc:destroy
            Destroy Terraform-created LXCs. Existing skipped LXCs are preserved.

          task terraform:lxc:destroy:target TERRAFORM_LXC_TARGET=dns01
            Destroy one Terraform-created LXC resource by logical hostname.
        EOHELP

  lxc:init:
    desc: Initialise the Proxmox Community Scripts LXC Terraform directory.
    cmds:
      - |
        set -euo pipefail
        terraform -chdir='{{.TERRAFORM_LXC_DIR}}' init

  lxc:fmt:
    desc: Format the Proxmox Community Scripts LXC Terraform files.
    cmds:
      - |
        set -euo pipefail
        terraform -chdir='{{.TERRAFORM_LXC_DIR}}' fmt -recursive

  lxc:validate:
    desc: Validate the Proxmox Community Scripts LXC Terraform configuration.
    deps:
      - lxc:init
    cmds:
      - |
        set -euo pipefail
        terraform -chdir='{{.TERRAFORM_LXC_DIR}}' validate

  lxc:passwords:prepare:
    desc: Prompt for missing per-container LXC root passwords and prepare Terraform LXC secrets.
    cmds:
      - |
        set -euo pipefail

        if [[ ! -f '{{.PASSWORDS_ENCRYPTED_FILE}}' ]]; then
          echo 'Encrypted password file is missing. Creating it first.'
          task passwords:encrypt
        fi

        python3 '{{.TERRAFORM_LXC_SECRET_MANAGER_SCRIPT}}' \
          --containers-file '{{.TERRAFORM_LXC_VARS_FILE}}' \
          --password-file '{{.PASSWORDS_ENCRYPTED_FILE}}' \
          --recipients-file '{{.SOPS_AGE_RECIPIENTS_FILE}}' \
          --age-key-file '{{.SOPS_AGE_KEY_FILE}}' \
          --output-file '{{.TERRAFORM_LXC_SECRET_TFVARS}}' \
          --prompt-missing

  lxc:plan:
    desc: Plan Proxmox Community Scripts LXC deployment.
    deps:
      - lxc:init
    cmds:
      - |
        set -euo pipefail

        load_homelab_env() {
          if [[ -f '{{.CONFIG_ENV_FILE}}' ]]; then
            set -a
            # shellcheck disable=SC1091
            . '{{.CONFIG_ENV_FILE}}'
            set +a
          fi

          if [[ -f '{{.PASSWORDS_ENCRYPTED_FILE}}' ]] && command -v sops >/dev/null 2>&1; then
            if [[ -f '{{.SOPS_AGE_KEY_FILE}}' ]] && SOPS_AGE_KEY_FILE='{{.SOPS_AGE_KEY_FILE}}' sops -d '{{.PASSWORDS_ENCRYPTED_FILE}}' >/dev/null 2>&1; then
              set -a
              # shellcheck disable=SC1090
              . <(SOPS_AGE_KEY_FILE='{{.SOPS_AGE_KEY_FILE}}' sops -d '{{.PASSWORDS_ENCRYPTED_FILE}}')
              set +a
            elif sops -d '{{.PASSWORDS_ENCRYPTED_FILE}}' >/dev/null 2>&1; then
              set -a
              # shellcheck disable=SC1090
              . <(sops -d '{{.PASSWORDS_ENCRYPTED_FILE}}')
              set +a
            fi
          fi
        }

        prepare_lxc_secret_tfvars() {
          python3 '{{.TERRAFORM_LXC_SECRET_MANAGER_SCRIPT}}' \
            --containers-file '{{.TERRAFORM_LXC_VARS_FILE}}' \
            --password-file '{{.PASSWORDS_ENCRYPTED_FILE}}' \
            --recipients-file '{{.SOPS_AGE_RECIPIENTS_FILE}}' \
            --age-key-file '{{.SOPS_AGE_KEY_FILE}}' \
            --output-file '{{.TERRAFORM_LXC_SECRET_TFVARS}}' \
            --prompt-missing
        }

        resolve_controlplane_ssh_public_key() {
          local ssh_private_key_file="$1"
          local ssh_public_key_file="${HOMELAB_SSH_PUBLIC_KEY_FILE:-${ssh_private_key_file}.pub}"
          local ssh_public_key=""

          if [[ -f "$ssh_public_key_file" ]]; then
            ssh_public_key="$(head -n 1 "$ssh_public_key_file")"
          elif [[ -f "$ssh_private_key_file" ]] && command -v ssh-keygen >/dev/null 2>&1; then
            ssh_public_key="$(ssh-keygen -y -f "$ssh_private_key_file")"
          fi

          if [[ -z "$ssh_public_key" ]]; then
            echo "ERROR: Control-plane SSH public key could not be resolved." >&2
            echo "       Checked: ${ssh_public_key_file}" >&2
            echo "       Set HOMELAB_SSH_PUBLIC_KEY_FILE or ensure ${ssh_private_key_file}.pub exists." >&2
            exit 1
          fi

          printf '%s\n' "$ssh_public_key"
        }

        load_homelab_env
        prepare_lxc_secret_tfvars

        proxmox_host="${PROXMOX_SSH_HOST:-${PROXMOX_HOST_IP:-}}"
        proxmox_user="${PROXMOX_SSH_USER:-root}"
        proxmox_port="${PROXMOX_SSH_PORT:-22}"
        ssh_key_file="${HOMELAB_SSH_KEY_FILE:-{{.SSH_KEY_FILE}}}"
        controlplane_ssh_public_key="$(resolve_controlplane_ssh_public_key "$ssh_key_file")"

        if [[ -z "$proxmox_host" ]]; then
          echo 'ERROR: PROXMOX_SSH_HOST or PROXMOX_HOST_IP must be set in state/config/.env.' >&2
          echo '       Run: task proxmox:host:configure' >&2
          exit 1
        fi

        terraform -chdir='{{.TERRAFORM_LXC_DIR}}' plan \
          -var="proxmox_host=${proxmox_host}" \
          -var="proxmox_ssh_user=${proxmox_user}" \
          -var="proxmox_ssh_port=${proxmox_port}" \
          -var="proxmox_ssh_private_key_file=${ssh_key_file}" \
          -var="controlplane_ssh_public_key=${controlplane_ssh_public_key}"

  lxc:apply:
    desc: Apply Proxmox Community Scripts LXC deployment.
    deps:
      - lxc:init
    cmds:
      - |
        set -euo pipefail

        load_homelab_env() {
          if [[ -f '{{.CONFIG_ENV_FILE}}' ]]; then
            set -a
            # shellcheck disable=SC1091
            . '{{.CONFIG_ENV_FILE}}'
            set +a
          fi

          if [[ -f '{{.PASSWORDS_ENCRYPTED_FILE}}' ]] && command -v sops >/dev/null 2>&1; then
            if [[ -f '{{.SOPS_AGE_KEY_FILE}}' ]] && SOPS_AGE_KEY_FILE='{{.SOPS_AGE_KEY_FILE}}' sops -d '{{.PASSWORDS_ENCRYPTED_FILE}}' >/dev/null 2>&1; then
              set -a
              # shellcheck disable=SC1090
              . <(SOPS_AGE_KEY_FILE='{{.SOPS_AGE_KEY_FILE}}' sops -d '{{.PASSWORDS_ENCRYPTED_FILE}}')
              set +a
            elif sops -d '{{.PASSWORDS_ENCRYPTED_FILE}}' >/dev/null 2>&1; then
              set -a
              # shellcheck disable=SC1090
              . <(sops -d '{{.PASSWORDS_ENCRYPTED_FILE}}')
              set +a
            fi
          fi
        }

        prepare_lxc_secret_tfvars() {
          python3 '{{.TERRAFORM_LXC_SECRET_MANAGER_SCRIPT}}' \
            --containers-file '{{.TERRAFORM_LXC_VARS_FILE}}' \
            --password-file '{{.PASSWORDS_ENCRYPTED_FILE}}' \
            --recipients-file '{{.SOPS_AGE_RECIPIENTS_FILE}}' \
            --age-key-file '{{.SOPS_AGE_KEY_FILE}}' \
            --output-file '{{.TERRAFORM_LXC_SECRET_TFVARS}}' \
            --prompt-missing
        }

        resolve_controlplane_ssh_public_key() {
          local ssh_private_key_file="$1"
          local ssh_public_key_file="${HOMELAB_SSH_PUBLIC_KEY_FILE:-${ssh_private_key_file}.pub}"
          local ssh_public_key=""

          if [[ -f "$ssh_public_key_file" ]]; then
            ssh_public_key="$(head -n 1 "$ssh_public_key_file")"
          elif [[ -f "$ssh_private_key_file" ]] && command -v ssh-keygen >/dev/null 2>&1; then
            ssh_public_key="$(ssh-keygen -y -f "$ssh_private_key_file")"
          fi

          if [[ -z "$ssh_public_key" ]]; then
            echo "ERROR: Control-plane SSH public key could not be resolved." >&2
            echo "       Checked: ${ssh_public_key_file}" >&2
            echo "       Set HOMELAB_SSH_PUBLIC_KEY_FILE or ensure ${ssh_private_key_file}.pub exists." >&2
            exit 1
          fi

          printf '%s\n' "$ssh_public_key"
        }

        load_homelab_env
        prepare_lxc_secret_tfvars

        proxmox_host="${PROXMOX_SSH_HOST:-${PROXMOX_HOST_IP:-}}"
        proxmox_user="${PROXMOX_SSH_USER:-root}"
        proxmox_port="${PROXMOX_SSH_PORT:-22}"
        ssh_key_file="${HOMELAB_SSH_KEY_FILE:-{{.SSH_KEY_FILE}}}"
        controlplane_ssh_public_key="$(resolve_controlplane_ssh_public_key "$ssh_key_file")"

        if [[ -z "$proxmox_host" ]]; then
          echo 'ERROR: PROXMOX_SSH_HOST or PROXMOX_HOST_IP must be set in state/config/.env.' >&2
          echo '       Run: task proxmox:host:configure' >&2
          exit 1
        fi

        terraform -chdir='{{.TERRAFORM_LXC_DIR}}' apply \
          -parallelism='{{.TERRAFORM_PARALLELISM}}' \
          -var="proxmox_host=${proxmox_host}" \
          -var="proxmox_ssh_user=${proxmox_user}" \
          -var="proxmox_ssh_port=${proxmox_port}" \
          -var="proxmox_ssh_private_key_file=${ssh_key_file}" \
          -var="controlplane_ssh_public_key=${controlplane_ssh_public_key}"
      - |
        set -euo pipefail
        task env_create:inventory:add:terraform-lxc
      - task: lxc:start

  lxc:start:
    desc: Start any Terraform-defined Proxmox LXCs that exist but are not running.
    cmds:
      - |
        set -euo pipefail

        if [[ -f '{{.CONFIG_ENV_FILE}}' ]]; then
          set -a
          # shellcheck disable=SC1091
          . '{{.CONFIG_ENV_FILE}}'
          set +a
        fi

        proxmox_host="${PROXMOX_SSH_HOST:-${PROXMOX_HOST_IP:-}}"
        proxmox_user="${PROXMOX_SSH_USER:-root}"
        proxmox_port="${PROXMOX_SSH_PORT:-22}"
        ssh_key_file="${HOMELAB_SSH_KEY_FILE:-{{.SSH_KEY_FILE}}}"

        if [[ -z "$proxmox_host" ]]; then
          echo 'ERROR: PROXMOX_SSH_HOST or PROXMOX_HOST_IP must be set in state/config/.env.' >&2
          echo '       Run: task proxmox:host:configure' >&2
          exit 1
        fi

        python3 '{{.PROXMOX_LXC_START_MANAGER_SCRIPT}}' \
          --containers-file '{{.TERRAFORM_LXC_VARS_FILE}}' \
          --proxmox-host "$proxmox_host" \
          --proxmox-user "$proxmox_user" \
          --proxmox-port "$proxmox_port" \
          --ssh-key-file "$ssh_key_file" \
          --wait-seconds '{{.PROXMOX_LXC_START_WAIT_SECONDS}}' \
          --wait-ssh \
          --ssh-wait-seconds '{{.PROXMOX_LXC_SSH_WAIT_SECONDS}}'

  lxc:destroy:
    desc: Destroy Terraform-created Proxmox Community Scripts LXCs.
    deps:
      - lxc:init
    cmds:
      - |
        set -euo pipefail

        if [[ -f '{{.CONFIG_ENV_FILE}}' ]]; then
          set -a
          # shellcheck disable=SC1091
          . '{{.CONFIG_ENV_FILE}}'
          set +a
        fi

        proxmox_host="${PROXMOX_SSH_HOST:-${PROXMOX_HOST_IP:-}}"
        proxmox_user="${PROXMOX_SSH_USER:-root}"
        proxmox_port="${PROXMOX_SSH_PORT:-22}"
        ssh_key_file="${HOMELAB_SSH_KEY_FILE:-{{.SSH_KEY_FILE}}}"

        if [[ -z "$proxmox_host" ]]; then
          echo 'ERROR: PROXMOX_SSH_HOST or PROXMOX_HOST_IP must be set in state/config/.env.' >&2
          echo '       Run: task proxmox:host:configure' >&2
          exit 1
        fi

        terraform -chdir='{{.TERRAFORM_LXC_DIR}}' destroy \
          -parallelism='{{.TERRAFORM_PARALLELISM}}' \
          -var="proxmox_host=${proxmox_host}" \
          -var="proxmox_ssh_user=${proxmox_user}" \
          -var="proxmox_ssh_port=${proxmox_port}" \
          -var="proxmox_ssh_private_key_file=${ssh_key_file}"

  lxc:destroy:target:
    desc: Destroy one Terraform-created LXC by logical hostname.
    deps:
      - lxc:init
    cmds:
      - |
        set -euo pipefail

        if [[ -f '{{.CONFIG_ENV_FILE}}' ]]; then
          set -a
          # shellcheck disable=SC1091
          . '{{.CONFIG_ENV_FILE}}'
          set +a
        fi

        target='{{.TERRAFORM_LXC_TARGET}}'
        proxmox_host="${PROXMOX_SSH_HOST:-${PROXMOX_HOST_IP:-}}"
        proxmox_user="${PROXMOX_SSH_USER:-root}"
        proxmox_port="${PROXMOX_SSH_PORT:-22}"
        ssh_key_file="${HOMELAB_SSH_KEY_FILE:-{{.SSH_KEY_FILE}}}"

        if [[ -z "$target" ]]; then
          echo 'ERROR: TERRAFORM_LXC_TARGET is required, for example TERRAFORM_LXC_TARGET=dns01.' >&2
          exit 1
        fi

        if [[ -z "$proxmox_host" ]]; then
          echo 'ERROR: PROXMOX_SSH_HOST or PROXMOX_HOST_IP must be set in state/config/.env.' >&2
          echo '       Run: task proxmox:host:configure' >&2
          exit 1
        fi

        terraform -chdir='{{.TERRAFORM_LXC_DIR}}' destroy \
          -target="null_resource.community_script_lxc[\"${target}\"]" \
          -var="proxmox_host=${proxmox_host}" \
          -var="proxmox_ssh_user=${proxmox_user}" \
          -var="proxmox_ssh_port=${proxmox_port}" \
          -var="proxmox_ssh_private_key_file=${ssh_key_file}"
