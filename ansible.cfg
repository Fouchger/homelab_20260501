# ============================================================================
# File: ansible.cfg
# Purpose:
#   Keep Ansible execution anchored to this repository layout.
# Notes:
#   - Role lookup must include ansible/roles when playbooks are stored under
#     ansible/playbooks.
# ============================================================================

[defaults]
roles_path = ansible/roles:~/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles
inventory = state/ansible/inventory.yml
retry_files_enabled = False
stdout_callback = default
result_format = yaml
interpreter_python = auto_silent

[privilege_escalation]
become = True
become_method = sudo
