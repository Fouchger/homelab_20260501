---
# ==============================================================================
# File: ansible/roles/homelab_shared_drives/tasks/main.yml
# Purpose:
#   Configure shared SMB/CIFS drives using native, idempotent Ansible tasks.
# Notes:
#   - Avoids wrapping an interactive shell script.
#   - Credentials are written once to a root-owned 0600 file.
# ==============================================================================

- name: Validate shared-drive behaviour value
  ansible.builtin.assert:
    that:
      - homelab_shared_drives_behaviour in ['s', 'r']
    fail_msg: "homelab_shared_drives_behaviour must be 's' for skip or 'r' for replace."

- name: Validate OMV password is available
  ansible.builtin.assert:
    that:
      - homelab_omv_password | length > 0
    fail_msg: "Set OMV_SMB_PASSWORD in the SOPS-loaded password file or pass homelab_omv_password securely."
  no_log: true

- name: Install packages required for shared storage configuration
  ansible.builtin.apt:
    name:
      - cifs-utils
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts.os_family == 'Debian'

- name: Ensure shared drive mount directories exist
  ansible.builtin.file:
    path: "{{ homelab_shared_drive_mount_root }}/{{ item }}"
    state: directory
    owner: "{{ homelab_shared_drive_mount_owner }}"
    group: "{{ homelab_shared_drive_mount_group }}"
    mode: "{{ homelab_shared_drive_mount_mode }}"
  loop: "{{ homelab_shared_drive_names }}"

- name: Ensure Samba credential directory exists
  ansible.builtin.file:
    path: /etc/samba
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Remove existing OMV credential file when replacement is requested
  ansible.builtin.file:
    path: /etc/samba/omv-cred
    state: absent
  when: homelab_shared_drives_replace_credentials | bool

- name: Write OMV CIFS credential file
  ansible.builtin.copy:
    dest: /etc/samba/omv-cred
    owner: root
    group: root
    mode: '0600'
    content: |
      username={{ homelab_omv_username }}
      password={{ homelab_omv_password }}
  no_log: true

- name: Check whether CIFS mount entries already exist
  ansible.builtin.command: >-
    awk -v mount_path={{ homelab_shared_drive_mount_root }}/{{ item }}
    '$0 !~ /^[[:space:]]*#/ && NF >= 2 && $2 == mount_path { found=1 } END { exit(found ? 0 : 1) }'
    /etc/fstab
  register: homelab_shared_drive_fstab_checks
  changed_when: false
  failed_when: false
  loop: "{{ homelab_shared_drive_names }}"

- name: Configure CIFS mounts in fstab
  ansible.posix.mount:
    path: "{{ homelab_shared_drive_mount_root }}/{{ item.item }}"
    src: "//{{ homelab_omv_ip }}/{{ item.item }}"
    fstype: cifs
    opts: "{{ homelab_shared_drive_mount_options }}"
    state: present
  loop: "{{ homelab_shared_drive_fstab_checks.results }}"
  when: >-
    homelab_shared_drives_behaviour == 'r' or
    item.rc != 0

- name: Mount configured CIFS shares
  ansible.builtin.command: mount -a -t cifs
  register: homelab_shared_drive_mount_result
  changed_when: false
